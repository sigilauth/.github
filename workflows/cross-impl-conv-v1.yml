# Cross-Implementation SIGIL-CONV-V1 Wire Protocol Tests
# Spec: api/wire-protocol.md
# Proves all 7 platforms implement identical wire protocol (pair handshake, envelopes, replay protection)

name: Cross-Implementation SIGIL-CONV-V1

on:
  push:
    branches: [main, feat/*]
    paths:
      - 'api/wire-protocol.md'
      - 'api/test-vectors/wire-protocol/**'
      - 'api/pictogram-pool-v1.json'
      - 'tests/cross-impl/**'
      - 'server/**'
      - 'cli-device/**'
      - 'app/**'
      - 'desktop/**'
      - '.github/workflows/cross-impl-conv-v1.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/wire-protocol.md'
      - 'api/test-vectors/wire-protocol/**'
      - 'tests/cross-impl/**'
  schedule:
    - cron: '0 8 * * *' # Daily 8am UTC (catch drift)

permissions:
  contents: read

jobs:
  # Build Go implementations (server + cli-device)
  build-go:
    name: Build Go Implementations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build server crypto-sign harness
        working-directory: server
        run: |
          if grep -q "pair-handshake\|envelope-encrypt\|envelope-decrypt" cmd/sigil-server/main.go 2>/dev/null || \
             grep -q "pair-handshake\|envelope-encrypt\|envelope-decrypt" cmd/sigil-server/cmd_crypto.go 2>/dev/null; then
            make build
            mkdir -p bin
            cp ./sigil-server bin/sigil-server || cp ./cmd/sigil-server/sigil-server bin/sigil-server || true
          else
            echo "Server CONV-V1 crypto harness not implemented yet (skipping)"
          fi

      - name: Build cli-device crypto-sign harness
        working-directory: cli-device
        run: |
          if grep -q "pair-handshake\|envelope-encrypt\|envelope-decrypt" cmd/sigil-device/main.go 2>/dev/null || \
             grep -q "pair-handshake\|envelope-encrypt\|envelope-decrypt" cmd/sigil-device/cmd_crypto.go 2>/dev/null; then
            make build
            mkdir -p bin
            cp ./sigil-device bin/sigil-device || cp ./cmd/sigil-device/sigil-device bin/sigil-device || true
          else
            echo "CLI device CONV-V1 crypto harness not implemented yet (skipping)"
          fi

      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: |
            server/bin/sigil-server
            cli-device/bin/sigil-device
          if-no-files-found: warn

  # Build iOS crypto-sign test harness
  build-ios:
    name: Build iOS Crypto Test Harness
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for CONV-V1 implementation
        id: check
        working-directory: app/ios
        run: |
          if grep -r "pair-handshake\|envelope-encrypt\|envelope-decrypt" Sources/ 2>/dev/null; then
            echo "implemented=true" >> $GITHUB_OUTPUT
          else
            echo "implemented=false" >> $GITHUB_OUTPUT
            echo "iOS CONV-V1 crypto harness not implemented yet (skipping)"
          fi

      - name: Build iOS crypto-sign harness
        if: steps.check.outputs.implemented == 'true'
        working-directory: app/ios
        run: |
          swift build --configuration release
          mkdir -p bin
          cp .build/release/sigil-crypto-test bin/sigil-crypto-test

      - name: Upload iOS binary
        if: steps.check.outputs.implemented == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-binary
          path: app/ios/bin/sigil-crypto-test

  # Build Android crypto-sign test harness
  build-android:
    name: Build Android Crypto Test Harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Check for CONV-V1 implementation
        id: check
        working-directory: app/android
        run: |
          if grep -r "pair-handshake\|envelope-encrypt\|envelope-decrypt" app/src/ 2>/dev/null || \
             [ -f "crypto-test/build.gradle.kts" ]; then
            echo "implemented=true" >> $GITHUB_OUTPUT
          else
            echo "implemented=false" >> $GITHUB_OUTPUT
            echo "Android CONV-V1 crypto harness not implemented yet (skipping)"
          fi

      - name: Build Android crypto-sign harness
        if: steps.check.outputs.implemented == 'true'
        working-directory: app/android
        run: |
          ./gradlew assembleCryptoTest
          mkdir -p bin
          find . -name "sigil-crypto-test" -type f -executable -exec cp {} bin/ \;

      - name: Upload Android binary
        if: steps.check.outputs.implemented == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: app/android/bin/sigil-crypto-test

  # Build macOS crypto-sign test harness
  build-macos:
    name: Build macOS Crypto Test Harness
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for CONV-V1 implementation
        id: check
        working-directory: desktop/macos
        run: |
          if grep -r "pair-handshake\|envelope-encrypt\|envelope-decrypt" Sources/ 2>/dev/null; then
            echo "implemented=true" >> $GITHUB_OUTPUT
          else
            echo "implemented=false" >> $GITHUB_OUTPUT
            echo "macOS CONV-V1 crypto harness not implemented yet (skipping)"
          fi

      - name: Build macOS crypto-sign harness
        if: steps.check.outputs.implemented == 'true'
        working-directory: desktop/macos
        run: |
          swift build --configuration release
          mkdir -p bin
          cp .build/release/sigil-crypto-test bin/sigil-crypto-test

      - name: Upload macOS binary
        if: steps.check.outputs.implemented == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: desktop/macos/bin/sigil-crypto-test

  # Build Windows crypto-sign test harness
  build-windows:
    name: Build Windows Crypto Test Harness
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Check for CONV-V1 implementation
        id: check
        working-directory: desktop/windows
        shell: pwsh
        run: |
          if (Select-String -Path "src/Sigil.Windows.CryptoTest/**/*.cs" -Pattern "pair-handshake|envelope-encrypt|envelope-decrypt" -ErrorAction SilentlyContinue) {
            echo "implemented=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "implemented=false" >> $env:GITHUB_OUTPUT
            echo "Windows CONV-V1 crypto harness not implemented yet (skipping)"
          }

      - name: Build Windows crypto-sign harness
        if: steps.check.outputs.implemented == 'true'
        working-directory: desktop/windows
        run: |
          dotnet build src/Sigil.Windows.CryptoTest -c Release
          mkdir -p bin
          cp src/Sigil.Windows.CryptoTest/bin/Release/net8.0/sigil-crypto-test.exe bin/

      - name: Upload Windows binary
        if: steps.check.outputs.implemented == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: desktop/windows/bin/sigil-crypto-test.exe

  # Build Linux crypto-sign test harness
  build-linux:
    name: Build Linux Crypto Test Harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Check for CONV-V1 implementation
        id: check
        working-directory: desktop/linux
        run: |
          if grep -r "pair-handshake\|envelope-encrypt\|envelope-decrypt" src/ 2>/dev/null; then
            echo "implemented=true" >> $GITHUB_OUTPUT
          else
            echo "implemented=false" >> $GITHUB_OUTPUT
            echo "Linux CONV-V1 crypto harness not implemented yet (skipping)"
          fi

      - name: Build Linux crypto-sign harness
        if: steps.check.outputs.implemented == 'true'
        working-directory: desktop/linux
        run: |
          cargo build --release --bin sigil-crypto-test
          mkdir -p bin
          cp target/release/sigil-crypto-test bin/

      - name: Upload Linux binary
        if: steps.check.outputs.implemented == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: desktop/linux/bin/sigil-crypto-test

  # Run cross-implementation CONV-V1 tests
  cross-impl-test:
    name: CONV-V1 Cross-Implementation Test Suite
    runs-on: ubuntu-latest
    needs: [build-go, build-ios, build-android, build-macos, build-windows, build-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Organize binaries into expected locations
        run: |
          mkdir -p server/bin cli-device/bin app/ios/bin app/android/bin \
                   desktop/macos/bin desktop/windows/bin desktop/linux/bin

          # Copy Go binaries
          cp artifacts/go-binaries/server/bin/sigil-server server/bin/ 2>/dev/null || echo "Server binary not found"
          cp artifacts/go-binaries/cli-device/bin/sigil-device cli-device/bin/ 2>/dev/null || echo "CLI binary not found"

          # Copy mobile binaries
          cp artifacts/ios-binary/sigil-crypto-test app/ios/bin/ 2>/dev/null || echo "iOS binary not found"
          cp artifacts/android-binary/sigil-crypto-test app/android/bin/ 2>/dev/null || echo "Android binary not found"

          # Copy desktop binaries
          cp artifacts/macos-binary/sigil-crypto-test desktop/macos/bin/ 2>/dev/null || echo "macOS binary not found"
          cp artifacts/windows-binary/sigil-crypto-test.exe desktop/windows/bin/ 2>/dev/null || echo "Windows binary not found"
          cp artifacts/linux-binary/sigil-crypto-test desktop/linux/bin/ 2>/dev/null || echo "Linux binary not found"

          # Make all binaries executable
          chmod +x server/bin/* cli-device/bin/* app/ios/bin/* app/android/bin/* \
                   desktop/macos/bin/* desktop/windows/bin/* desktop/linux/bin/* 2>/dev/null || true

      - name: Verify test vectors exist
        run: |
          ls -la api/test-vectors/wire-protocol/
          echo ""
          echo "Test vector files:"
          find api/test-vectors/wire-protocol/ -name "*.json" -exec basename {} \;

      - name: Run CONV-V1 cross-implementation test suite
        working-directory: tests/cross-impl
        run: |
          go test -v -timeout 15m -run "TestPairHandshake|TestEnvelope|TestCrossDomain|TestReplay"

      - name: Report test results
        if: always()
        run: |
          echo "## SIGIL-CONV-V1 Cross-Implementation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Vectors:**" >> $GITHUB_STEP_SUMMARY
          echo "- Pair handshake (session pictogram derivation)" >> $GITHUB_STEP_SUMMARY
          echo "- Envelope construction (sign-then-encrypt)" >> $GITHUB_STEP_SUMMARY
          echo "- Replay rejection (timestamp, nonce, audience)" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-domain rejection (CONV vs AUTH/MPA/DECRYPT)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See test output above for per-platform results." >> $GITHUB_STEP_SUMMARY

  # Final aggregation job (passes only if all tests pass)
  all-platforms:
    name: All Platforms CONV-V1 Compatible
    runs-on: ubuntu-latest
    needs: [cross-impl-test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.cross-impl-test.result }}" != "success" ]; then
            echo "::error::SIGIL-CONV-V1 cross-implementation tests failed or were skipped"
            echo "::notice::Some platforms may not have implemented CONV-V1 crypto harness yet"
            exit 1
          fi
          echo "✓ All platform implementations produce compatible CONV-V1 wire protocol"
          echo "✓ Pair handshake: identical session pictograms"
          echo "✓ Envelopes: interoperable sign-then-encrypt"
          echo "✓ Replay protection: timestamp + nonce + audience validated"
          echo "✓ Domain separation: cross-protocol signatures rejected"
